<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2E7D32" />
    <!-- PWA manifest for the SPA (root-served since the WP-12 flip). -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      // Apply dark mode immediately to prevent a flash (ported verbatim from
      // Components/App.razor:22-37). Toggles the EXACT class `mud-theme-dark`,
      // which the not-yet-migrated islands also detect. Kept inline here so it
      // runs before first paint.
      (function () {
        var darkMode = localStorage.getItem('darkMode');
        if (darkMode === 'true') {
          document.documentElement.classList.add('mud-theme-dark');
          document.documentElement.style.backgroundColor = '#121212';
        }
      })();
      // Mirror a preference into a cookie so the server can seed it on the next
      // request. Kept in lockstep with the localStorage writes in theme.svelte.ts.
      window.setPrefCookie = function (name, value) {
        document.cookie = name + '=' + value + '; path=/; max-age=31536000; SameSite=Lax';
      };
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      // Register the SPA's service worker at the site root — since the WP-12 flip the
      // SPA owns / (the Blazor app + its root service worker are gone). Registering the
      // root scope also supersedes any lingering /app/-scoped worker from pre-flip visits.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js', { scope: '/' })
            .then(function () {
              console.log('SPA service worker registered');
            })
            .catch(function (err) {
              console.log('SPA service worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
